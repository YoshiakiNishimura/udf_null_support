syntax = "proto3";
// buf format -w
package sample;

message AddRequest {
  optional int32 a = 1;
  optional int32 b = 2;
  //int32 a = 1;
  //int32 b = 2;
}

message AddResponse {
  optional int32 result = 1;
  //int32 result = 1;
}
service Calculator {
  rpc optional_add(AddRequest) returns (AddResponse);
}
