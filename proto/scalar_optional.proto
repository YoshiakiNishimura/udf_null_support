syntax = "proto3";
// buf format -w
package sample;

import "tsurugidb/udf/tsurugi_types.proto";

message OptionalScalarRequest {
  optional double double_value = 1;
  optional float float_value = 2;
  optional int32 int32_value = 3;
  optional int64 int64_value = 4;
  optional uint32 uint32_value = 5;
  optional uint64 uint64_value = 6;
  optional sint32 sint32_value = 7;
  optional sint64 sint64_value = 8;
  optional fixed32 fixed32_value = 9;
  optional fixed64 fixed64_value = 10;
  optional sfixed32 sfixed32_value = 11;
  optional sfixed64 sfixed64_value = 12;
  optional string string_value = 13;
  optional bytes bytes_value = 14;
}

message OptionalScalarResponse {
  optional double result = 1;
}
message OptionalDecimal {
  optional tsurugidb.udf.Decimal decimal_value = 1;
  optional tsurugidb.udf.Date date_value = 2;
  optional tsurugidb.udf.LocalTime localtime_value = 3;
  optional tsurugidb.udf.LocalDatetime localdatetime_value = 4;
  optional tsurugidb.udf.OffsetDatetime offsetdatatime_value = 5;
}
service ScalarOptionalTest {
  rpc optional_all(OptionalScalarRequest) returns (OptionalScalarResponse);
  rpc optional_decimal(OptionalDecimal) returns (OptionalDecimal);
}
